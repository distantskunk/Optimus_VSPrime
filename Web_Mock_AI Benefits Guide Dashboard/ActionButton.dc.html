<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<button onClick="{{ onClick }}" style="{{ btnStyle }}" style-hover="{{ hoverStyle }}" style-active="{{ activeStyle }}">
  <span style="display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;">{{ icon }}</span>
  <span>{{ label }}</span>
</button>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:220,&quot;height&quot;:56},&quot;action&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;find-doctor&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;options&quot;:[&quot;find-doctor&quot;,&quot;view-benefits&quot;,&quot;view-id-card&quot;,&quot;claims-history&quot;,&quot;reimbursement-help&quot;,&quot;billing-actions&quot;,&quot;contact-support&quot;,&quot;schedule-callback&quot;]},&quot;variant&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;primary&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;options&quot;:[&quot;primary&quot;,&quot;secondary&quot;]}}">
class Component extends DCLogic {
  catalog(key) {
    const map = {
      'find-doctor': 'Find Doctor',
      'view-benefits': 'View Benefits',
      'view-id-card': 'View ID Card',
      'claims-history': 'Claims History',
      'reimbursement-help': 'Reimbursement Help',
      'billing-actions': 'Billing Actions',
      'contact-support': 'Contact Support',
      'schedule-callback': 'Schedule Callback',
    };
    return map[key] || key;
  }

  icon(key, color) {
    const R = React.createElement;
    const s = { width: 18, height: 18, viewBox: '0 0 24 24', fill: 'none' };
    const p = (d, extra) => R('path', Object.assign({ d, stroke: color, strokeWidth: 2, strokeLinecap: 'round', strokeLinejoin: 'round' }, extra));
    switch (key) {
      case 'find-doctor':
        return R('svg', s, [p('M12 21s-7-6.2-7-11a7 7 0 0 1 14 0c0 4.8-7 11-7 11Z', { key: 1 }), R('circle', { key: 2, cx: 12, cy: 10, r: 2.4, fill: color, stroke: 'none' })]);
      case 'view-benefits':
        return R('svg', s, [p('M12 2 4 5v6c0 5 3.4 8.7 8 11 4.6-2.3 8-6 8-11V5l-8-3Z', { key: 1 }), p('m8.5 12 2.4 2.4L16 9.5', { key: 2 })]);
      case 'view-id-card':
        return R('svg', s, [R('rect', { key: 1, x: 3, y: 5, width: 18, height: 14, rx: 2.4, stroke: color, strokeWidth: 2 }), p('M3 9.5h18', { key: 2 }), p('M6.5 14.5h5', { key: 3 })]);
      case 'claims-history':
        return R('svg', s, [p('M6 3h9l4 4v14H6V3Z', { key: 1 }), p('M14 3v4h4', { key: 2 }), p('M9 12h6M9 15.5h6M9 8.5h3', { key: 3 })]);
      case 'reimbursement-help':
        return R('svg', s, [p('M6 3h12v18l-3-1.8L12 21l-3-1.8L6 21V3Z', { key: 1 }), p('M9 8h6M9 12h6', { key: 2 })]);
      case 'billing-actions':
        return R('svg', s, [R('rect', { key: 1, x: 3, y: 5, width: 18, height: 14, rx: 2.4, stroke: color, strokeWidth: 2 }), p('M3 9.5h18', { key: 2 }), p('M6.5 14.5h4', { key: 3 })]);
      case 'contact-support':
        return R('svg', s, [p('M5 13a7 7 0 0 1 14 0', { key: 1 }), p('M5 13v3a2 2 0 0 0 2 2h1v-6H6a1 1 0 0 0-1 1ZM19 13v3a2 2 0 0 1-2 2h-1v-6h2a1 1 0 0 1 1 1Z', { key: 2, fill: color }), p('M17 18c0 1.5-1.4 2.5-3 2.5', { key: 3 })]);
      case 'schedule-callback':
        return R('svg', s, [p('M15.5 21A11 11 0 0 1 3 8.5 2 2 0 0 1 5 6.5h2.2a1 1 0 0 1 1 .8l.7 3a1 1 0 0 1-.3 1L7.3 12.7a9 9 0 0 0 4 4l1.4-1.3a1 1 0 0 1 1-.25l3 .7a1 1 0 0 1 .8 1V19a2 2 0 0 1-2 2Z', { key: 1 })]);
      default:
        return null;
    }
  }

  renderVals() {
    const variant = this.props.variant || 'primary';
    const action = this.props.action || 'find-doctor';
    const base = 'display:inline-flex;align-items:center;gap:9px;border-radius:12px;padding:14px 18px;font-size:15px;font-weight:800;letter-spacing:-0.1px;cursor:pointer;font-family:inherit;transition:all .15s ease;white-space:nowrap;';
    let btnStyle, hoverStyle, activeStyle, iconColor;
    if (variant === 'secondary') {
      iconColor = '#3b45d4';
      btnStyle = base + 'background:#FFFFFF;color:#3b45d4;border:1.5px solid #C7CEFB;box-shadow:0 2px 6px rgba(11,31,58,0.04);';
      hoverStyle = 'background:#EEF1FF;border-color:#505ff8;';
      activeStyle = 'background:#E1E5FF;transform:translateY(1px);';
    } else {
      iconColor = '#FFFFFF';
      btnStyle = base + 'background:linear-gradient(150deg,#505ff8,#3b45d4);color:#FFFFFF;border:1px solid rgba(255,255,255,0.12);box-shadow:0 8px 18px rgba(80,95,248,0.34);';
      hoverStyle = 'filter:brightness(1.06);transform:translateY(-1px);box-shadow:0 12px 24px rgba(80,95,248,0.42);';
      activeStyle = 'transform:translateY(1px);box-shadow:0 4px 10px rgba(80,95,248,0.3);';
    }
    return {
      label: this.catalog(action),
      icon: this.icon(action, iconColor),
      btnStyle, hoverStyle, activeStyle,
      onClick: this.props.onClick || (() => {}),
    };
  }
}
</script>
</body>
</html>
